<div class="success-modal-header">
  <div class="success-icon-container">
    <mat-icon>verified</mat-icon>
  </div>
  <div>
    <h2 mat-dialog-title style="margin: 0; padding: 0; border: none; color: #15803d;">¡Cita registrada!</h2>
  </div>
</div>

<div mat-dialog-content class="success-dialog-content">
  <p class="success-text">La reservación ha sido guardada exitosamente en el sistema.</p>
  <div class="ticket-container">
    <span class="ticket-label">N° de Ticket:</span>
    <span class="ticket-number">#{{data.numero}}</span>
  </div>
</div>

<div mat-dialog-actions align="center" class="premium-dialog-actions"
  style="justify-content: center; margin-top: 10px;">
  <button mat-raised-button mat-dialog-close color="primary" class="btn-success">
    <mat-icon>check</mat-icon>
    Entendido
  </button>
</div>
