<div class="premium-modal-header">
  <div class="modal-icon-container success-glow">
    <mat-icon>mark_email_read</mat-icon>
  </div>
  <h2 class="modal-title">Verificación de Seguridad</h2>
  <p class="modal-subtitle">
    Hemos enviado un código de seguridad de 6 dígitos al correo: <br>
    <strong class="email-highlight">{{data.correo}}</strong>
  </p>
</div>

<mat-dialog-content class="premium-modal-content">
  <form [formGroup]="formOtp" (ngSubmit)="verificarOTP()" class="otp-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Código OTP</mat-label>
      <input matInput formControlName="codigo" placeholder="123456" maxlength="6" autocomplete="off"
        class="otp-input">
      <mat-error *ngIf="formOtp.get('codigo')?.hasError('required')">El código es requerido</mat-error>
      <mat-error *ngIf="formOtp.get('codigo')?.hasError('minlength')">El código debe tener 6 dígitos</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="premium-dialog-actions">
  <button mat-button color="warn" (click)="cancelar()" class="btn-cancel">Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="formOtp.invalid || loading" (click)="verificarOTP()" class="btn-submit">
    <mat-icon>verified</mat-icon>
    <span>Verificar y Activar</span>
  </button>
</mat-dialog-actions>
