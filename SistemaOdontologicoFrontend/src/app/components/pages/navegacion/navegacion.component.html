<mat-toolbar class="glass-toolbar">
  <mat-toolbar-row class="toolbar-row">
    <!-- Header Izquierdo: Menú y Marca -->
    <div class="brand-section">
      <button mat-icon-button (click)="drawer.toggle()" class="menu-btn" aria-label="Abrir menú de navegación">
        <mat-icon aria-hidden="true">menu</mat-icon>
      </button>
      <div class="brand-logo-wrapper-small">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="premium-svg-logo-small">
          <path d="M7 4V20" stroke="url(#da-grad-toolbar)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M7 4H13C17.5 4 19 7.5 19 12C19 16.5 17.5 20 13 20H7" stroke="url(#da-grad-toolbar)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 4L15 20" stroke="url(#da-grad-toolbar)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M9.5 12H15" stroke="url(#da-grad-toolbar)" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="da-grad-toolbar" x1="7" y1="4" x2="19" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="var(--color-primary-light)"/>
              <stop offset="1" stop-color="var(--color-primary)"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-title">DentAgend</h1>
    </div>

    <!-- Header Derecho: Usuario -->
    <div class="user-section">
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
        <div class="user-info-container">
          <div class="user-avatar">
            {{correoUsuario?.charAt(0) | uppercase}}
          </div>
          <div class="user-details">
            <span class="user-email">{{correoUsuario}}</span>
            <span class="user-role">{{rolUsuario}}</span>
          </div>
          <mat-icon class="dropdown-icon" aria-hidden="true">arrow_drop_down</mat-icon>
        </div>
      </button>

      <mat-menu #userMenu="matMenu" xPosition="before" class="premium-dark-menu">
        <button mat-menu-item [routerLink]="['/pages/perfil']">
          <mat-icon class="menu-icon-primary">account_circle</mat-icon>
          <span>Mi perfil</span>
        </button>
        <button mat-menu-item [routerLink]="['/pages/configuracion']">
          <mat-icon class="menu-icon-primary">settings</mat-icon>
          <span>Configuración</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="cerrarSession()">
          <mat-icon class="menu-icon-warn">logout</mat-icon>
          <span class="text-warn">Cerrar sesión</span>
        </button>
      </mat-menu>
    </div>
  </mat-toolbar-row>
</mat-toolbar>

<div class="content-container">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #drawer class="dark-sidenav" [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="true">

      <mat-nav-list class="menu-list">
        <mat-list-item *ngFor="let menu of listaMenu" [routerLink]="menu.url" routerLinkActive="active-link">
          <mat-icon mat-list-icon class="nav-icon">{{menu.icono}}</mat-icon>
          <div mat-line class="nav-text">{{menu.nombre}}</div>
        </mat-list-item>
      </mat-nav-list>

    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <div class="page-wrapper">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
